<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ansara Tanit | Professional Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #ffffff;
            --accent-color: #1a1a1a;
            --text-main: #333333;
            --header-height: 80px;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: var(--text-main);
            background-color: var(--primary-bg);
        }

        /* --- THE UPGRADED HEADER --- */
        header {
            height: var(--header-height);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            position: fixed;
            width: 100%;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px); /* Modern frosted glass effect */
            border-bottom: 1px solid #eee;
            z-index: 1000;
            transition: var(--transition);
        }

        header.scrolled {
            height: 60px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            color: var(--accent-color);
            letter-spacing: -0.5px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        nav ul li a {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 400;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        nav ul li a:hover {
            color: #666;
        }

        /* Call to Action Button in Header */
        .cta-btn {
            background: var(--accent-color);
            color: white !important;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
            background: linear-gradient(to bottom, #f9f9f9, #ffffff);
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            margin-bottom: 20px;
            line-height: 1.1;
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 600px;
            color: #666;
            margin-bottom: 30px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            nav { display: none; } /* Add a hamburger menu later if needed */
        }
    </style>
</head>
<body>

    <header id="main-header">
        <a href="#" class="logo">ANSARA TANIT</a>
        <nav>
            <ul>
                <li><a href="#work">Work</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact" class="cta-btn">Get in Touch</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Creative Vision. <br>Digital Excellence.</h1>
            <p>Moving your brand from Wix to a high-performance, custom-coded experience.</p>
        </section>
        
        </main>

    <script>
        // Header scroll effect
        window.addEventListener('scroll', () => {
            const header = document.getElementById('main-header');
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
