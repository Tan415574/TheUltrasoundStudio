<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ansara Tanit | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #111111;
            --accent: #000000;
            --secondary-text: #666666;
            --header-blur: rgba(255, 255, 255, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* --- THE UPGRADED HEADER --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 6%;
            z-index: 1000;
            background: var(--header-blur);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        header.scrolled {
            height: 65px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 700;
            text-decoration: none;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 40px;
            align-items: center;
        }

        nav ul li a {
            text-decoration: none;
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 500;
            position: relative;
            transition: 0.3s;
        }

        /* Hover Line Animation */
        nav ul li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -5px;
            left: 0;
            background-color: var(--accent);
            transition: width 0.3s ease;
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        .header-cta {
            background: var(--accent);
            color: white !important;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.85rem;
            transition: transform 0.2s ease;
        }

        .header-cta:hover {
            transform: translateY(-2px);
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0 10%;
            background: #fcfcfc;
        }

        .hero-content {
            max-width: 800px;
        }

        .hero-content h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 800;
            line-height: 0.9;
            margin-bottom: 24px;
            letter-spacing: -2px;
        }

        .hero-content p {
            font-size: 1.25rem;
            color: var(--secondary-text);
            max-width: 500px;
            margin-bottom: 40px;
        }

        /* --- IMAGE GRID SECTION (Standard Wix Studio Layout) --- */
        .work-grid {
            padding: 100px 6%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
        }

        .grid-item {
            width: 100%;
            background: #f0f0f0;
            aspect-ratio: 4/5;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .grid-item:hover img {
            transform: scale(1.05);
        }

        /* Responsive adjustments */
        @media (max-width: 900px) {
            .work-grid { grid-template-columns: 1fr; }
            nav { display: none; } /* Simplified for mobile */
            .hero-content h1 { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <header id="navbar">
        <a href="#" class="logo">ANSARA TANIT</a>
        <nav>
            <ul>
                <li><a href="#work">Featured Work</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact" class="header-cta">Contact Me</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Digital <br>Experiences.</h1>
            <p>A showcase of professional design and creative strategy tailored for the modern web.</p>
        </div>
    </section>

    <section id="work" class="work-grid">
        <div class="grid-item">
            <img src="https://images.unsplash.com/photo-1494438639946-1ebd1d20bf85?auto=format&fit=crop&q=80&w=1000" alt="Project 1">
        </div>
        <div class="grid-item">
            <img src="https://images.unsplash.com/photo-1558655146-d09347e92766?auto=format&fit=crop&q=80&w=1000" alt="Project 2">
        </div>
    </section>

    <script>
        // Shrink header on scroll
        window.onscroll = function() {
            const nav = document.getElementById('navbar');
            if (window.pageYOffset > 50) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        };
    </script>

</body>
</html>
